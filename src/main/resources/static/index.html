<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PR Review Test - 사용자 관리 시스템</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .nav-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
        }

        .nav-tab {
            flex: 1;
            padding: 15px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            color: #6c757d;
            transition: all 0.3s ease;
        }

        .nav-tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .nav-tab:hover {
            background: #e9ecef;
        }

        .content {
            padding: 30px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .section-title {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-danger {
            background: #dc3545;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .data-table th, .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }

        .data-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
        }

        .data-table tr:hover {
            background: #f8f9fa;
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid transparent;
        }

        .alert-success {
            background: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }

        .alert-error {
            background: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #6c757d;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-card p {
            opacity: 0.9;
        }

        .code-review-warning {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .code-review-warning h4 {
            margin-bottom: 10px;
        }

        .code-review-warning ul {
            margin-left: 20px;
        }

        .code-review-warning li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 AI PR Review Test</h1>
            <p>사용자 관리 시스템 - 코드 리뷰 도구 테스트용</p>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('users')">👥 사용자</button>
            <button class="nav-tab" onclick="showTab('posts')">📝 게시글</button>
            <button class="nav-tab" onclick="showTab('comments')">💬 댓글</button>
            <button class="nav-tab" onclick="showTab('stats')">📊 통계</button>
        </div>

        <div class="content">
            <!-- 사용자 관리 탭 -->
            <div id="users" class="tab-content active">
                <h2 class="section-title">사용자 관리</h2>
                
                <div class="code-review-warning">
                    <h4>⚠️ 코드 리뷰 도구가 검출할 수 있는 패턴들:</h4>
                    <ul>
                        <li>하드코딩된 민감 정보 (비밀번호, API 키)</li>
                        <li>의미없는 필드 (a1b2c3)</li>
                        <li>무한 순환 참조 (JPA 양방향 관계)</li>
                        <li>SQL 인젝션 취약점</li>
                    </ul>
                </div>

                <div class="form-group">
                    <button class="btn" onclick="loadUsers()">사용자 목록 새로고침</button>
                </div>

                <div id="usersTable"></div>
            </div>

            <!-- 게시글 관리 탭 -->
            <div id="posts" class="tab-content">
                <h2 class="section-title">게시글 관리</h2>
                
                <div class="form-group">
                    <button class="btn" onclick="loadPosts()">게시글 목록 새로고침</button>
                </div>

                <div id="postsTable"></div>
            </div>

            <!-- 댓글 관리 탭 -->
            <div id="comments" class="tab-content">
                <h2 class="section-title">댓글 관리</h2>
                
                <div class="form-group">
                    <button class="btn" onclick="loadComments()">댓글 목록 새로고침</button>
                </div>

                <div id="commentsTable"></div>
            </div>

            <!-- 통계 탭 -->
            <div id="stats" class="tab-content">
                <h2 class="section-title">시스템 통계</h2>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3 id="userCount">-</h3>
                        <p>총 사용자 수</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="postCount">-</h3>
                        <p>총 게시글 수</p>
                    </div>
                    <div class="stat-card">
                        <h3 id="commentCount">-</h3>
                        <p>총 댓글 수</p>
                    </div>
                </div>

                <div class="form-group">
                    <button class="btn" onclick="loadStats()">통계 새로고침</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        
        // 탭 전환 함수
        function showTab(tabName) {
            // 모든 탭 콘텐츠 숨기기
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 모든 탭 버튼 비활성화
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 선택된 탭 활성화
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            
            // 탭별 데이터 로드
            switch(tabName) {
                case 'users':
                    loadUsers();
                    break;
                case 'posts':
                    loadPosts();
                    break;
                case 'comments':
                    loadComments();
                    break;
                case 'stats':
                    loadStats();
                    break;
            }
        }

        // 사용자 목록 로드
        async function loadUsers() {
            try {
                showLoading('usersTable');
                const response = await fetch(`${API_BASE}/users`);
                const data = await response.json();
                
                if (data.success) {
                    displayUsers(data.data);
                } else {
                    showError('usersTable', '사용자 목록을 불러오는데 실패했습니다.');
                }
            } catch (error) {
                showError('usersTable', '네트워크 오류가 발생했습니다.');
            }
        }

        // 게시글 목록 로드
        async function loadPosts() {
            try {
                showLoading('postsTable');
                const response = await fetch(`${API_BASE}/posts`);
                const data = await response.json();
                
                if (data.success) {
                    displayPosts(data.data);
                } else {
                    showError('postsTable', '게시글 목록을 불러오는데 실패했습니다.');
                }
            } catch (error) {
                showError('postsTable', '네트워크 오류가 발생했습니다.');
            }
        }

        // 댓글 목록 로드
        async function loadComments() {
            try {
                showLoading('commentsTable');
                const response = await fetch(`${API_BASE}/comments`);
                const data = await response.json();
                
                if (data.success) {
                    displayComments(data.data);
                } else {
                    showError('commentsTable', '댓글 목록을 불러오는데 실패했습니다.');
                }
            } catch (error) {
                showError('commentsTable', '네트워크 오류가 발생했습니다.');
            }
        }

        // 통계 로드
        async function loadStats() {
            try {
                const [usersResponse, postsResponse, commentsResponse] = await Promise.all([
                    fetch(`${API_BASE}/users`),
                    fetch(`${API_BASE}/posts`),
                    fetch(`${API_BASE}/comments`)
                ]);
                
                const usersData = await usersResponse.json();
                const postsData = await postsResponse.json();
                const commentsData = await commentsResponse.json();
                
                document.getElementById('userCount').textContent = usersData.success ? usersData.data.length : 0;
                document.getElementById('postCount').textContent = postsData.success ? postsData.data.length : 0;
                document.getElementById('commentCount').textContent = commentsData.success ? commentsData.data.length : 0;
            } catch (error) {
                console.error('통계 로드 오류:', error);
            }
        }

        // 사용자 테이블 표시
        function displayUsers(users) {
            const table = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>사용자명</th>
                            <th>이메일</th>
                            <th>역할</th>
                            <th>생성일</th>
                            <th>코드 리뷰 패턴</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users.map(user => `
                            <tr>
                                <td>${user.id}</td>
                                <td>${user.username}</td>
                                <td>${user.email}</td>
                                <td><span style="background: ${user.role === 'ADMIN' ? '#dc3545' : '#28a745'}; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px;">${user.role}</span></td>
                                <td>${new Date(user.createdAt).toLocaleDateString()}</td>
                                <td>
                                    <div style="font-size: 12px;">
                                        <div style="color: #dc3545;">🔑 비밀번호: ${user.password}</div>
                                        <div style="color: #ffc107;">🔑 API키: ${user.apiKey}</div>
                                        <div style="color: #6f42c1;">🔑 토큰: ${user.secretToken}</div>
                                        <div style="color: #17a2b8;">❓ 의미없는 필드: ${user.a1b2c3}</div>
                                    </div>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('usersTable').innerHTML = table;
        }

        // 게시글 테이블 표시
        function displayPosts(posts) {
            const table = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>제목</th>
                            <th>내용</th>
                            <th>작성자</th>
                            <th>생성일</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${posts.map(post => `
                            <tr>
                                <td>${post.id}</td>
                                <td>${post.title}</td>
                                <td>${post.content ? post.content.substring(0, 50) + '...' : ''}</td>
                                <td>${post.user ? post.user.username : 'N/A'}</td>
                                <td>${new Date(post.createdAt).toLocaleDateString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('postsTable').innerHTML = table;
        }

        // 댓글 테이블 표시
        function displayComments(comments) {
            const table = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>내용</th>
                            <th>작성자</th>
                            <th>게시글</th>
                            <th>생성일</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${comments.map(comment => `
                            <tr>
                                <td>${comment.id}</td>
                                <td>${comment.content}</td>
                                <td>${comment.user ? comment.user.username : 'N/A'}</td>
                                <td>${comment.post ? comment.post.title : 'N/A'}</td>
                                <td>${new Date(comment.createdAt).toLocaleDateString()}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('commentsTable').innerHTML = table;
        }

        // 로딩 표시
        function showLoading(elementId) {
            document.getElementById(elementId).innerHTML = '<div class="loading">데이터를 불러오는 중...</div>';
        }

        // 에러 표시
        function showError(elementId, message) {
            document.getElementById(elementId).innerHTML = `<div class="alert alert-error">${message}</div>`;
        }

        // 페이지 로드 시 초기 데이터 로드
        window.onload = function() {
            loadUsers();
        };
    </script>
</body>
</html>
